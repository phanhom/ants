# Nest + Ants: zero-config multi-agent platform.
# `docker compose up -d` builds and starts core services.
# `docker compose --profile full up -d` to include GitLab.
#
# Port allocation (22000 series):
#   22000  Nest API (management platform)
#   22002  Dashboard (SPA + backend)
#   22003  MinIO API (S3-compatible)
#   22004  MinIO Console
#   22005  MySQL
#   22006  GitLab HTTP (profile: full)
#   22100  Queen agent (creator_decider)
#   22101  Workers (internal, assigned by DockerSpawner)

services:
  # ── Nest: Management Platform ──────────────────────────────────────
  nest:
    build:
      context: ./nest
      dockerfile: Dockerfile
    container_name: nest
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "22000:22000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ants
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: ants
    volumes:
      - ./nest/configs:/app/configs:ro
    command: ["uvicorn", "nest.api:app", "--host", "0.0.0.0", "--port", "22000"]
    restart: unless-stopped

  dashboard:
    build:
      context: ./nest/dashboard
      dockerfile: Dockerfile
      args:
        VITE_NEST_URL: http://localhost:22000
    container_name: ants-dashboard
    depends_on:
      nest:
        condition: service_started
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "22002:3000"
    environment:
      PORT: "3000"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ants
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: ants
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ants
      MINIO_SECRET_KEY: antspassword
    restart: unless-stopped

  # ── Ants: Talent Market (Queen + Workers) ──────────────────────────
  queen:
    build:
      context: ./ants
      dockerfile: Dockerfile
    container_name: ants-queen
    depends_on:
      nest:
        condition: service_started
      mysql:
        condition: service_healthy
    ports:
      - "22100:22100"
    environment:
      ANTS_HOST_PROJECT_ROOT: ${PWD}/ants
      ANTS_IMAGE: ants-queen
      ANTS_NETWORK: ants_default
      ANTS_CONFIG_DIR: /app/configs/agents
      ANTS_VOLUMES_ROOT: /app/data/volumes
      ANTS_RUNTIME_CONFIG: /app/configs/config.json
      NEST_URL: http://nest:22000
      NEST_SECRET: ""
    volumes:
      - ./ants:/app/host
      - ./ants/configs:/app/configs:ro
      - ./data/volumes:/app/data/volumes
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["uvicorn", "ants.queen.api:app", "--host", "0.0.0.0", "--port", "22100"]
    restart: unless-stopped

  # ── Infrastructure ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ants-mysql
    environment:
      MYSQL_ROOT_PASSWORD: antsroot
      MYSQL_DATABASE: ants
      MYSQL_USER: ants
      MYSQL_PASSWORD: changeme
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "22005:3306"
    restart: unless-stopped
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uants", "-pchangeme"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  minio:
    image: minio/minio
    container_name: ants-minio
    command: server /data --console-address ":9001"
    ports:
      - "22003:9000"
      - "22004:9001"
    environment:
      MINIO_ROOT_USER: ants
      MINIO_ROOT_PASSWORD: antspassword
    volumes:
      - ./data/minio:/data
    restart: unless-stopped

  gitlab:
    profiles: ["full"]
    image: gitlab/gitlab-ce:latest
    container_name: ants-gitlab
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab'
        nginx['listen_port'] = 80
        gitlab_rails['initial_root_password'] = 'changeme'
        puma['worker_processes'] = 2
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab
    ports:
      - "22006:80"
    restart: unless-stopped
    shm_size: "256m"
