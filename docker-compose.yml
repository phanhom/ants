# Ants: zero-config multi-agent system.
# All inter-service credentials are hardcoded — just `docker compose up -d`.
# Only LLM_API_KEY needs to be set externally (in configs/config.json or as env override).
#
# Port allocation (22000 series):
#   22000  Queen API
#   22001  Workers (internal, assigned by DockerSpawner)
#   22002  Dashboard (SPA + backend)
#   22003  MinIO API (S3-compatible)
#   22004  MinIO Console
#   22005  MySQL
#   22006  GitLab HTTP
#
# Data layout (all under ./data/, gitignored):
#   data/volumes/    Per-agent traces, logs, workspace
#   data/mysql/      MySQL data files
#   data/minio/      MinIO object storage (artifacts)
#   data/gitlab/     GitLab config + data + logs

services:
  queen:
    build: .
    image: ants:latest
    container_name: ants-queen
    ports:
      - "22000:22000"
    environment:
      PWD: ${PWD}
      ANTS_HOST_PROJECT_ROOT: ${PWD}
      ANTS_IMAGE: ants:latest
      ANTS_NETWORK: ants_default
      ANTS_AUTO_SPAWN_DEFAULT: "1"
      ANTS_CONFIG_DIR: /app/configs/agents
      ANTS_VOLUMES_ROOT: /app/data/volumes
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ants
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: ants
    volumes:
      - .:/app/host
      - ./configs:/app/configs:ro
      - ./data/volumes:/app/data/volumes
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["uvicorn", "ants.api.main:app", "--host", "0.0.0.0", "--port", "22000"]
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_QUEEN_URL: http://localhost:22000
    image: ants-dashboard:latest
    container_name: ants-dashboard
    ports:
      - "22002:3000"
    environment:
      PORT: "3000"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ants
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: ants
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ants
      MINIO_SECRET_KEY: antspassword
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: ants-mysql
    environment:
      MYSQL_ROOT_PASSWORD: antsroot
      MYSQL_DATABASE: ants
      MYSQL_USER: ants
      MYSQL_PASSWORD: changeme
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "22005:3306"
    restart: unless-stopped
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  minio:
    image: minio/minio
    container_name: ants-minio
    command: server /data --console-address ":9001"
    ports:
      - "22003:9000"
      - "22004:9001"
    environment:
      MINIO_ROOT_USER: ants
      MINIO_ROOT_PASSWORD: antspassword
    volumes:
      - ./data/minio:/data
    restart: unless-stopped

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: ants-gitlab
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab'
        nginx['listen_port'] = 80
        gitlab_rails['initial_root_password'] = 'changeme'
        puma['worker_processes'] = 2
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab
    ports:
      - "22006:80"
    restart: unless-stopped
    shm_size: "256m"
