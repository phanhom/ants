# Ants 统一配置。全部为字面默认值，不读环境变量。

# -----------------------------------------------------------------------------
# LLM（拆解与工人任务）
# -----------------------------------------------------------------------------
llm:
  base_url: "https://api.openai.com/v1"
  model_name: "gpt-4"
  api_key: ""
  context_length: 128000
  max_tokens: 4096

# -----------------------------------------------------------------------------
# GitLab（gitlab_* 工具，不配则工具调用时报错）
# -----------------------------------------------------------------------------
gitlab:
  url: ""
  token: ""

# -----------------------------------------------------------------------------
# MySQL（trace 双写与 Dashboard；host 为空则不连库）
# -----------------------------------------------------------------------------
mysql:
  host: ""
  port: 3306
  user: "ants"
  password: ""
  database: "ants"

# -----------------------------------------------------------------------------
# Ants 运行（仅保留需业务调节的项；目录/端口/镜像等由代码或部署固定）
# -----------------------------------------------------------------------------
ants:
  auto_spawn_default: "1"
  admin_token: ""
  status_cache_ttl_sec: "5"
  decompose_llm_timeout: "60"
  aip_send_timeout: "30"
  aip_send_max_retries: "4"
